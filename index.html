<!DOCTYPE html>
<html>
    <head>
        <title>SeCunDely</title>
    </head>
    <style>
        details {
            border: 2px solid #585858;
            border-radius: 12px;
            background-color: #f4f8fa;
            padding: 15px;
            max-width: 400px;
            font-family: sans-serif;
            transition: all 0.3s ease;
        }

        summary {
            font-weight: bold;
            color: #757575;
            cursor: pointer;
            outline: none;
        }

        details[open] {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
    <body>
        <div id="device type prompt">
            <h3>select device side</h3>
            <button onclick="typeselected(true)">phone</button>
            <button onclick="typeselected(false)">tracker</button>
        </div>


        <div id="phonemain">
            <i id="agentcph" style="color: green;"></i>
            <h2>IPhone sdl;f;</h2>
        </div>
        
        <div id="trackermain">
            <i id="agentctr" style="color: green;"></i>
            <button>Export Animation</button>
            <hr>
            <details id="tracklog">
                <summary>output</summary>
            </details>
        </div>

        <script>
            let isPhone = false;
            var dtp = document.getElementById("device type prompt");
            var phom = document.getElementById("phonemain");
            var compm = document.getElementById("trackermain");
            var tracklog = document.getElementById("trackerlog");
            phom.style.display = "none";
            compm.style.display = "none";
            dtp.style.display = "block";
            let isconnected = false;
            

            function typeselected(isPhonecc){
                if(isPhonecc){
                    isPhone = true;
                    phom.style.display = "block"
                    socket.send("PHONE CONNECTED");
                    requestMotionPermission();
                }
                else{
                    compm.style.display = "block"
                    socket.send("TRACKER CONNECTED");
                }
                dtp.style.display = "none"
            }

            function requestMotionPermission() {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                            } else {
                                console.error("Orientation permission denied.");
                            }
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }
            
            const socket = new WebSocket('ws://localhost:8080');

            socket.onopen = () => {
                console.log('connected');
                document.getElementById('serverlog').innerHTML += '<p>connected</p>';
                isconnected = true;

                socket.send("AGENT CONNECTED")
            };

            socket.onclose = () => {
                console.log('disconnected');
                document.getElementById('serverlog').innerHTML += '<p>disconnected</p>';
                isconnected = false;
            }

            socket.onmessage = (event) => {
                if(!isPhone){
                    tracklog += `<p>${event.data}</p>`;
                }
                if(event.data === "PHONE CONNECTED"){
                    document.getElementById("agentctr").innerHTML = "Phone Connected"
                }
                if(event.data === "TRACKER CONNECTED"){
                    document.getElementById("agentcph").innerHTML = "Tracker Connected"
                }
            };


            function startTrackingSession(session) {
                renderer.xr.setSession(session);
                renderer.setAnimationLoop(streamTrackingFrame);
            }

            function streamTrackingFrame() {
                const xrCamera = renderer.xr.getCamera(camera);
                
                if (xrCamera && socket.readyState === WebSocket.OPEN) {
                    const position = xrCamera.position;
                    const rotation = xrCamera.rotation;

                    const payload = JSON.stringify({
                        px: position.x,
                        py: position.y,
                        pz: position.z,
                        
                        rx: rotation.x * (180 / Math.PI), 
                        ry: rotation.y * (180 / Math.PI), 
                        rz: rotation.z * (180 / Math.PI)
                    });
                    socket.send(payload);
                }
            }


            function sendMessage() {
                const input = document.getElementById('messageInput');
                if(input != ""){
                    socket.send(input.value);
                }
                document.getElementById('chatLog').innerHTML += `<p>you: ${input.value}</p>`;
                input.value = '';
            }
        </script>
    </body>
</html>
